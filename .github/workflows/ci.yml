name: CI
on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    # Standard xmidt-org checks: gofmt (style), golangci-lint, REUSE/license,
    # copyright, unit tests (-race) + coverage, build, and tagged releases.
    # Cross-platform (macOS/Windows/BSD) and CAP_NET_RAW coverage live in
    # cross-platform.yml, which shared-go does not provide.
    uses: xmidt-org/shared-go/.github/workflows/ci.yml@a0bb9aa6abbab3aedfbaecd4625c6949495c63df # v4.12.5
    with:
      release-type: library
    secrets: inherit
